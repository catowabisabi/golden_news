<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden News</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #080c14;
            --surface: #0f1624;
            --card:    #161d2e;
            --border:  rgba(255,215,0,0.10);
            --gold:    #ffd700;
            --cyan:    #00d4ff;
            --green:   #00c853;
            --red:     #ff3d57;
            --text:    #dde3f0;
            --muted:   #5a6580;
            --font:    'Inter', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            flex-shrink: 0;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 16px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 11px;
            color: var(--muted);
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--green);
            font-weight: 600;
            font-size: 11px;
        }

        .live-dot {
            width: 7px; height: 7px;
            background: var(--green);
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink { 50% { opacity: 0.25; } }

        .stat { color: var(--text); }
        .stat b { color: var(--gold); }

        /* ── Main layout ── */
        main {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        /* ── Graph panel ── */
        .graph-panel {
            flex: 1;
            position: relative;
            background: var(--bg);
            min-width: 0;
        }

        #graph-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Graph overlays */
        .overlay {
            position: absolute;
            background: rgba(15, 22, 36, 0.90);
            border: 1px solid var(--border);
            border-radius: 8px;
            backdrop-filter: blur(6px);
        }

        .graph-controls {
            top: 14px; left: 14px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
        }

        .graph-controls label { color: var(--gold); font-weight: 600; }
        .graph-controls #node-val { color: var(--text); min-width: 22px; display: inline-block; }

        input[type="range"] {
            width: 100px;
            accent-color: var(--gold);
            cursor: pointer;
        }

        .graph-btns {
            top: 14px; right: 14px;
            padding: 6px 8px;
            display: flex;
            gap: 6px;
        }

        .btn {
            padding: 5px 12px;
            background: transparent;
            border: 1px solid rgba(255,215,0,0.25);
            border-radius: 5px;
            color: var(--gold);
            font-size: 10px;
            font-family: var(--font);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .btn:hover {
            background: rgba(255,215,0,0.12);
        }

        .graph-legend {
            bottom: 16px; left: 14px;
            padding: 10px 14px;
        }

        .legend-title {
            color: var(--gold);
            font-weight: 600;
            font-size: 10px;
            margin-bottom: 6px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 10px;
            color: var(--text);
            margin-bottom: 3px;
        }

        .ldot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .graph-stats {
            position: absolute;
            bottom: 16px; right: 14px;
            font-size: 10px;
            color: var(--muted);
        }

        /* ── Tooltip ── */
        #tooltip {
            position: fixed;
            background: var(--card);
            border: 1px solid rgba(255,215,0,0.35);
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 11px;
            max-width: 280px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.12s;
            z-index: 999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            line-height: 1.5;
        }

        #tooltip.show { opacity: 1; }
        .tt-title { color: var(--text); font-weight: 600; margin-bottom: 5px; }
        .tt-meta  { color: var(--muted); font-size: 10px; margin-bottom: 3px; }
        .tt-kw    { color: var(--cyan);  font-size: 10px; }

        /* ── Sidebar ── */
        .sidebar {
            flex-shrink: 0;
            width: 360px;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-left: 1px solid var(--border);
            overflow: hidden;
        }

        /* Signals */
        .signals-pane {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            max-height: 50%;
            border-bottom: 1px solid var(--border);
        }

        /* Articles */
        .articles-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .pane-header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 16px;
            border-bottom: 1px solid var(--border);
        }

        .pane-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        .pane-badge {
            font-size: 10px;
            color: var(--muted);
            background: rgba(255,255,255,0.05);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .pane-body {
            overflow-y: auto;
            flex: 1;
            padding: 8px 12px;
        }

        /* Signal card */
        .sig-card {
            display: block;
            background: var(--bg);
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 5px;
            border-left: 3px solid var(--muted);
            text-decoration: none;
            transition: opacity 0.12s;
        }

        .sig-card:hover { opacity: 0.75; }
        .sig-card.long  { border-left-color: var(--green); }
        .sig-card.short { border-left-color: var(--red); }

        .sig-row1 {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 5px;
        }

        .sig-dir {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .sig-dir.long  { color: var(--green); }
        .sig-dir.short { color: var(--red); }
        .sig-dir.neutral { color: var(--muted); }

        .sig-asset {
            font-size: 9px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.07);
            color: var(--text);
            text-transform: uppercase;
        }

        .sig-conf {
            font-size: 10px;
            color: var(--muted);
            margin-left: auto;
        }

        .sig-headline {
            font-size: 11px;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .sig-meta {
            font-size: 9px;
            color: var(--muted);
        }

        /* Article item */
        .art-item {
            display: block;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            text-decoration: none;
            transition: opacity 0.12s;
        }

        .art-item:hover { opacity: 0.72; }

        .art-title {
            font-size: 11px;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .art-meta {
            display: flex;
            gap: 8px;
            font-size: 9px;
        }

        .art-src { color: var(--gold); }
        .positive { color: var(--green); }
        .negative { color: var(--red); }
        .neutral  { color: var(--muted); }

        /* Empty */
        .empty {
            padding: 20px 12px;
            text-align: center;
            font-size: 11px;
            color: var(--muted);
            line-height: 1.7;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.18); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,215,0,0.35); }
    </style>
</head>
<body>
    <header>
        <div class="logo">Golden News</div>
        <div class="header-right">
            <div class="live-badge">
                <div class="live-dot"></div>
                LIVE
            </div>
            <span class="stat"><b id="h-articles">0</b> articles</span>
            <span class="stat"><b id="h-signals">0</b> signals</span>
            <span id="h-time">–</span>
        </div>
    </header>

    <main>
        <!-- Graph -->
        <div class="graph-panel">
            <svg id="graph-svg"></svg>

            <div class="overlay graph-controls">
                <label>Nodes</label>
                <input type="range" id="node-slider" min="5" max="40" value="20">
                <span id="node-val">20</span>
            </div>

            <div class="overlay graph-btns">
                <button class="btn" id="btn-reset">Reset</button>
                <button class="btn" id="btn-labels">Labels</button>
            </div>

            <div class="overlay graph-legend">
                <div class="legend-title">Sentiment</div>
                <div class="legend-item"><div class="ldot" style="background:var(--green)"></div>Positive</div>
                <div class="legend-item"><div class="ldot" style="background:var(--red)"></div>Negative</div>
                <div class="legend-item"><div class="ldot" style="background:var(--muted)"></div>Neutral</div>
                <div class="legend-title" style="margin-top:8px">Marker</div>
                <div class="legend-item"><div class="ldot" style="border:2px solid var(--gold);background:transparent"></div>Signal</div>
            </div>

            <div class="graph-stats" id="graph-stats"></div>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="signals-pane">
                <div class="pane-header">
                    <span class="pane-title">⚡ Signals</span>
                    <span class="pane-badge" id="sig-badge">0</span>
                </div>
                <div class="pane-body" id="signals-list">
                    <div class="empty">No signals yet.<br>Run ai_analyzer.py to generate signals.</div>
                </div>
            </div>

            <div class="articles-pane">
                <div class="pane-header">
                    <span class="pane-title">📰 Latest Articles</span>
                    <span class="pane-badge" id="art-badge">0</span>
                </div>
                <div class="pane-body" id="articles-list">
                    <div class="empty">No articles yet.<br>Run collector.py to fetch news.</div>
                </div>
            </div>
        </aside>
    </main>

    <div id="tooltip">
        <div class="tt-title" id="tt-title"></div>
        <div class="tt-meta"  id="tt-meta"></div>
        <div class="tt-kw"   id="tt-kw"></div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        // When opened as a file (file://) change this to 'http://localhost:8050'
        const API = location.protocol === 'file:' ? 'http://localhost:8050' : '';

        const STOP = new Set([
            'that','this','with','from','have','been','were','they','what','when','where',
            'which','about','would','could','your','more','than','after','also','into',
            'some','will','their','there','just','only','over','such','before','being',
            'through','because','should','other','these','those','while','under','since',
            'then','very','much','like','said','make','know','want','need','take','come',
            'time','year','back','even','well','most','many','good','does','each','same'
        ]);

        let articles = [];
        let signals  = [];
        let nodeLimit = 20;
        let showLabels = true;
        let simulation = null;

        // ── Fetch ──
        async function fetchAll() {
            try {
                const [aRes, sRes] = await Promise.all([
                    fetch(API + '/api/articles'),
                    fetch(API + '/api/signals')
                ]);
                if (aRes.ok) articles = await aRes.json();
                if (sRes.ok) signals  = await sRes.json();
            } catch (e) {
                console.error('Fetch error:', e);
                return;
            }
            updateHeader();
            renderSignals();
            renderArticles();
            buildGraph();
        }

        function updateHeader() {
            document.getElementById('h-articles').textContent = articles.length;
            document.getElementById('h-signals').textContent  = signals.length;
            document.getElementById('h-time').textContent     = new Date().toLocaleTimeString();
        }

        // ── Signals ──
        function renderSignals() {
            const el = document.getElementById('signals-list');
            document.getElementById('sig-badge').textContent = signals.length;
            if (!signals.length) {
                el.innerHTML = '<div class="empty">No signals yet.<br>Run ai_analyzer.py to generate signals.</div>';
                return;
            }
            el.innerHTML = signals.slice(0, 12).map(s => {
                const dir  = (s.direction || 'neutral').toLowerCase();
                const conf = Math.round((s.confidence || 0) * 100);
                const href = s.article_url
                    ? s.article_url
                    : 'https://www.google.com/search?q=' + encodeURIComponent(s.headline || '');
                return `<a class="sig-card ${dir}" href="${href}" target="_blank">
                    <div class="sig-row1">
                        <span class="sig-dir ${dir}">${dir.toUpperCase()}</span>
                        <span class="sig-asset">${s.asset_class || '—'}</span>
                        <span class="sig-conf">${conf}%</span>
                    </div>
                    <div class="sig-headline">${esc(s.headline || '')}</div>
                    <div class="sig-meta">${esc(s.source_name || '')} · ${esc(s.time_horizon || '')}</div>
                </a>`;
            }).join('');
        }

        // ── Articles ──
        function renderArticles() {
            const el = document.getElementById('articles-list');
            document.getElementById('art-badge').textContent = articles.length;
            if (!articles.length) {
                el.innerHTML = '<div class="empty">No articles yet.<br>Run collector.py to fetch news.</div>';
                return;
            }
            el.innerHTML = articles.slice(0, 40).map(a => {
                const sent = a.sentiment_label || 'neutral';
                return `<a class="art-item" href="${a.url || '#'}" target="_blank">
                    <div class="art-title">${esc(a.title || '')}</div>
                    <div class="art-meta">
                        <span class="art-src">${esc((a.source_name || 'Unknown').slice(0, 20))}</span>
                        <span class="${sent}">${sent}</span>
                    </div>
                </a>`;
            }).join('');
        }

        // ── Graph ──
        const svgEl    = document.getElementById('graph-svg');
        const svg      = d3.select(svgEl);
        const gRoot    = svg.append('g');
        const panel    = document.querySelector('.graph-panel');
        const tooltip  = document.getElementById('tooltip');

        const zoom = d3.zoom()
            .scaleExtent([0.1, 6])
            .on('zoom', e => gRoot.attr('transform', e.transform));
        svg.call(zoom);

        document.getElementById('btn-reset').onclick = () =>
            svg.transition().duration(450).call(zoom.transform, d3.zoomIdentity);

        document.getElementById('btn-labels').onclick = () => {
            showLabels = !showLabels;
            gRoot.selectAll('.nlabel').style('opacity', showLabels ? 1 : 0);
        };

        const slider = document.getElementById('node-slider');
        slider.addEventListener('input', () => {
            nodeLimit = +slider.value;
            document.getElementById('node-val').textContent = nodeLimit;
            buildGraph();
        });

        function buildGraph() {
            const subset = articles.slice(0, nodeLimit);
            if (!subset.length) {
                gRoot.selectAll('*').remove();
                document.getElementById('graph-stats').textContent = '';
                return;
            }

            const nodes = subset.map(a => {
                const text = ((a.title || '') + ' ' + (a.summary || '')).toLowerCase();
                const kws  = [...new Set((text.match(/\b[a-z]{4,}\b/g) || [])
                    .filter(w => !STOP.has(w)))].slice(0, 12);
                const sent = a.sentiment_label || 'neutral';
                return {
                    id:       a.id,
                    title:    a.title || '',
                    label:    (a.title || '').split(' ').slice(0, 5).join(' '),
                    url:      a.url,
                    source:   a.source_name || '',
                    sentiment: sent,
                    color:    sent === 'positive' ? '#00c853' : sent === 'negative' ? '#ff3d57' : '#4a5568',
                    size:     a.is_trading_signal ? 12 : 7,
                    isSignal: !!a.is_trading_signal,
                    kws
                };
            });

            const edges = [];
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const shared = nodes[i].kws.filter(k => nodes[j].kws.includes(k));
                    if (shared.length >= 3) {
                        edges.push({
                            source:   nodes[i].id,
                            target:   nodes[j].id,
                            strength: Math.min(shared.length * 0.10, 0.9)
                        });
                    }
                }
            }

            const W = panel.clientWidth;
            const H = panel.clientHeight;
            svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);
            document.getElementById('graph-stats').textContent =
                `${nodes.length} nodes · ${edges.length} links`;

            gRoot.selectAll('*').remove();

            const link = gRoot.append('g').selectAll('line')
                .data(edges).enter().append('line')
                .attr('stroke', d => `rgba(255,215,0,${Math.max(d.strength * 0.45, 0.07)})`)
                .attr('stroke-width', d => Math.max(d.strength * 2, 0.4));

            const node = gRoot.append('g').selectAll('g')
                .data(nodes).enter().append('g')
                .style('cursor', 'pointer')
                .call(d3.drag()
                    .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                    .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
                    .on('end',   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
                );

            node.append('circle')
                .attr('r', d => d.size)
                .attr('fill', d => d.color)
                .attr('stroke', d => d.isSignal ? '#ffd700' : 'none')
                .attr('stroke-width', d => d.isSignal ? 2.5 : 0);

            node.append('text')
                .attr('class', 'nlabel')
                .text(d => d.label)
                .attr('dy', d => d.size + 11)
                .attr('text-anchor', 'middle')
                .attr('fill', '#7a8499')
                .attr('font-size', '8px')
                .attr('font-family', 'Inter, sans-serif')
                .style('pointer-events', 'none')
                .style('opacity', showLabels ? 1 : 0);

            node.on('mouseover', (e, d) => {
                document.getElementById('tt-title').textContent = d.title;
                document.getElementById('tt-meta').textContent  = `${d.source} · ${d.sentiment}`;
                document.getElementById('tt-kw').textContent    = d.kws.slice(0, 5).join(', ');
                tooltip.classList.add('show');
            }).on('mousemove', e => {
                tooltip.style.left = (e.clientX + 16) + 'px';
                tooltip.style.top  = (e.clientY - 12) + 'px';
            }).on('mouseout', () => {
                tooltip.classList.remove('show');
            }).on('click', (e, d) => {
                if (d.url) window.open(d.url, '_blank');
            });

            if (simulation) simulation.stop();
            simulation = d3.forceSimulation(nodes)
                .force('link',      d3.forceLink(edges).id(d => d.id).distance(d => 155 - d.strength * 55))
                .force('charge',    d3.forceManyBody().strength(-280))
                .force('center',    d3.forceCenter(W / 2, H / 2))
                .force('collision', d3.forceCollide().radius(d => d.size + 18))
                .on('tick', () => {
                    link
                        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                    node.attr('transform', d => {
                        d.x = Math.max(20, Math.min(W - 20, d.x));
                        d.y = Math.max(20, Math.min(H - 20, d.y));
                        return `translate(${d.x},${d.y})`;
                    });
                });
        }

        // ── Helpers ──
        function esc(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // ── Init ──
        fetchAll();
        setInterval(fetchAll, 30000);
        window.addEventListener('resize', buildGraph);
    </script>
</body>
</html>
