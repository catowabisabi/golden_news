<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden News</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #070b12;
            --surface: #0d1420;
            --card:    #111827;
            --border:  rgba(255,255,255,0.06);
            --gold:    #f5c518;
            --green:   #00c853;
            --red:     #ff3d57;
            --amber:   #f59e0b;
            --text:    #dde3f0;
            --sub:     #8898aa;
            --muted:   #3d4a5c;
            --font:    'Inter', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }
        body { display: flex; flex-direction: column; }

        /* ── Header ── */
        header {
            flex-shrink: 0;
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            gap: 16px;
        }

        .logo { font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }

        .h-sep { width: 1px; height: 16px; background: var(--border); }

        .live-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-dot {
            width: 6px; height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse { 50% { opacity: 0.2; } }

        #live-clock {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
            min-width: 68px;
        }

        #sig-label {
            font-size: 11px;
            color: var(--sub);
        }

        #sig-label b { color: var(--text); font-weight: 600; }

        /* Interest tags */
        .interest-strip {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .interest-label {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.3px;
        }

        .int-tag {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 9px;
            border-radius: 10px;
            background: rgba(245,197,24,0.10);
            color: var(--gold);
            border: 1px solid rgba(245,197,24,0.20);
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: background 0.12s;
        }

        .int-tag:hover { background: rgba(245,197,24,0.20); }

        /* ── Feed ── */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px 40px;
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
        }

        /* Section heading */
        .sec-head {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--muted);
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }

        .sec-head.clickable {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 28px;
        }

        .sec-head.clickable::after { content: '▾'; }
        .sec-head.clickable.shut::after { content: '▸'; }

        /* ── Signal card ── */
        .card {
            background: var(--card);
            border-radius: 7px;
            border-left: 3px solid var(--muted);
            padding: 14px 16px;
            margin-bottom: 8px;
            text-decoration: none;
            display: block;
            color: inherit;
            transition: background 0.12s, transform 0.1s;
        }

        .card:hover { background: #1a2438; transform: translateX(2px); }
        .card.long  { border-left-color: var(--green); }
        .card.short { border-left-color: var(--red); }
        .card.stale { opacity: 0.38; pointer-events: none; }
        .card.stale:hover { transform: none; }

        /* Top row: direction · asset · conf · age */
        .card-top {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 9px;
        }

        .dir {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.8px;
        }
        .dir.long  { color: var(--green); }
        .dir.short { color: var(--red); }

        .asset-pill {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* Asset colour palette */
        .a-oil         { background:rgba(255,107,53,.14); color:#ff6b35; border:1px solid rgba(255,107,53,.28); }
        .a-gold        { background:rgba(245,197,24,.12); color:#f5c518; border:1px solid rgba(245,197,24,.25); }
        .a-stocks      { background:rgba(0,212,255,.10);  color:#00d4ff; border:1px solid rgba(0,212,255,.20); }
        .a-crypto      { background:rgba(255,149,0,.12);  color:#ff9500; border:1px solid rgba(255,149,0,.25); }
        .a-bonds       { background:rgba(0,200,83,.10);   color:#00c853; border:1px solid rgba(0,200,83,.20); }
        .a-forex       { background:rgba(191,90,242,.12); color:#bf5af2; border:1px solid rgba(191,90,242,.25); }
        .a-commodities { background:rgba(255,45,85,.10);  color:#ff2d55; border:1px solid rgba(255,45,85,.20); }
        .a-default     { background:rgba(255,255,255,.05); color:var(--sub); border:1px solid var(--border); }

        .conf { font-size: 11px; font-weight: 600; color: var(--sub); }

        .age {
            margin-left: auto;
            font-size: 11px;
            font-variant-numeric: tabular-nums;
            color: var(--muted);
        }
        .age.fresh { color: var(--green); }
        .age.warn  { color: var(--amber); }
        .age.old   { color: var(--red);   font-weight: 600; }

        /* Headline */
        .headline {
            font-size: 13px;
            font-weight: 500;
            line-height: 1.5;
            color: var(--text);
            margin-bottom: 9px;
        }

        /* Meta row */
        .meta {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 10px;
            color: var(--muted);
        }

        .source { color: var(--sub); }

        .horizon-pill {
            padding: 1px 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.04);
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        /* ── Raw feed (collapsed) ── */
        .raw-toggle {
            margin-top: 28px;
            padding: 9px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 11px;
            color: var(--muted);
            cursor: pointer;
            text-align: center;
            transition: color 0.12s, border-color 0.12s;
        }

        .raw-toggle:hover { color: var(--sub); border-color: rgba(255,255,255,0.12); }

        .raw-feed { margin-top: 12px; display: none; }
        .raw-feed.open { display: block; }

        .raw-item {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
        }

        .raw-item:hover .raw-title { color: var(--text); }

        .raw-age {
            flex-shrink: 0;
            font-size: 10px;
            font-variant-numeric: tabular-nums;
            color: var(--muted);
            min-width: 52px;
        }

        .raw-title {
            font-size: 12px;
            color: var(--sub);
            line-height: 1.4;
            transition: color 0.12s;
        }

        /* Empty / error */
        .empty {
            padding: 60px 0;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.9;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 2px; }
    </style>
</head>
<body>

<header>
    <div class="logo">GN</div>
    <div class="h-sep"></div>
    <div class="live-row">
        <div class="live-dot"></div>
        <span id="live-clock">--:--:--</span>
    </div>
    <div class="h-sep"></div>
    <span id="sig-label"><b id="sc">0</b> active signals</span>
    <div class="interest-strip" id="interest-strip"></div>
</header>

<main id="feed">
    <div class="empty">Loading…</div>
</main>

<script>
// ─────────────────────────────────────────
// Config
// ─────────────────────────────────────────
const API = location.protocol === 'file:' ? 'http://localhost:8050' : '';

const KNOWN_ASSETS = new Set(['oil','gold','stocks','crypto','bonds','forex','commodities']);

// Exponential half-life (minutes) per time horizon
const HALF_LIFE = { 'intraday': 60, 'short-term': 360, 'medium-term': 1440 };

// Stale threshold (minutes)
const STALE_AT  = { 'intraday': 240, 'short-term': 1440, 'medium-term': 4320 };

// ─────────────────────────────────────────
// Interest profile  (localStorage)
// ─────────────────────────────────────────
const PKEY = 'gn_profile_v1';

function loadProfile()    { try { return JSON.parse(localStorage.getItem(PKEY)) || {}; } catch { return {}; } }
function saveProfile(p)   { localStorage.setItem(PKEY, JSON.stringify(p)); }

function boostAsset(asset) {
    if (!asset) return;
    const p = loadProfile();
    p[asset] = (p[asset] || 0) + 1;
    saveProfile(p);
    renderInterestStrip();
}

function dropAsset(asset) {
    const p = loadProfile();
    delete p[asset];
    saveProfile(p);
    renderInterestStrip();
    renderFeed();
}

function renderInterestStrip() {
    const p  = loadProfile();
    const el = document.getElementById('interest-strip');
    const top = Object.entries(p).sort((a,b) => b[1]-a[1]).slice(0,5);
    if (!top.length) { el.innerHTML = ''; return; }
    el.innerHTML = '<span class="interest-label">Tracking:</span>' +
        top.map(([a]) =>
            `<span class="int-tag" onclick="dropAsset('${x(a)}')" title="Click to remove">${x(a.toUpperCase())}</span>`
        ).join('');
}

// ─────────────────────────────────────────
// Ranking
// ─────────────────────────────────────────
function ageMins(ts) {
    return (Date.now() - new Date(ts).getTime()) / 60000;
}

function isStale(sig) {
    return ageMins(sig.generated_at) > (STALE_AT[sig.time_horizon] || STALE_AT['intraday']);
}

function score(sig) {
    const p     = loadProfile();
    const age   = ageMins(sig.generated_at);
    const hl    = HALF_LIFE[sig.time_horizon] || HALF_LIFE['intraday'];
    const fresh = Math.exp(-0.693 * age / hl);           // exponential decay
    const conf  = sig.confidence || 0.5;
    const total = Object.values(p).reduce((s,v) => s+v, 0) || 1;
    const boost = 0.5 * ((p[sig.asset_class] || 0) / total);  // up to +50%
    return fresh * conf * (1 + boost);
}

// ─────────────────────────────────────────
// Data
// ─────────────────────────────────────────
let signals  = [];
let articles = [];

async function fetchAll() {
    try {
        const [sr, ar] = await Promise.all([
            fetch(API + '/api/signals'),
            fetch(API + '/api/articles'),
        ]);
        if (sr.ok) signals  = await sr.json();
        if (ar.ok) articles = await ar.json();
    } catch(e) {
        console.error('Fetch failed:', e);
        return;
    }
    renderFeed();
}

// ─────────────────────────────────────────
// Render
// ─────────────────────────────────────────
function renderFeed() {
    const feed = document.getElementById('feed');

    // Only directional signals matter
    const valid = signals.filter(s =>
        s.direction && s.direction !== 'neutral' && s.direction !== 'hold'
    );

    const active = valid.filter(s => !isStale(s)).sort((a,b) => score(b) - score(a));
    const stale  = valid.filter(s =>  isStale(s)).sort((a,b) => score(b) - score(a)).slice(0,6);

    document.getElementById('sc').textContent = active.length;

    let html = '';

    if (!active.length && !stale.length) {
        html = `<div class="empty">
            No active signals.<br>
            <span style="font-size:11px">Run ai_analyzer.py to generate signals.</span>
        </div>`;
    } else {
        if (active.length) {
            html += '<div class="sec-head">Active Signals</div>';
            html += active.map(s => cardHTML(s, false)).join('');
        }
        if (stale.length) {
            html += `<div class="sec-head clickable shut" id="stale-hd" onclick="toggleStale()">
                Expired Signals (${stale.length})
            </div>
            <div id="stale-body" style="display:none">
                ${stale.map(s => cardHTML(s, true)).join('')}
            </div>`;
        }
    }

    // Raw news (non-signal, non-neutral) — hidden by default
    const raw = articles
        .filter(a => !a.is_trading_signal && a.sentiment_label !== 'neutral')
        .slice(0, 30);

    if (raw.length) {
        html += `<div class="raw-toggle" id="raw-btn" onclick="toggleRaw()">
            Show latest news feed (${raw.length})
        </div>
        <div class="raw-feed" id="raw-feed">
            <div class="sec-head" style="margin-top:0">Latest News</div>
            ${raw.map(rawHTML).join('')}
        </div>`;
    }

    feed.innerHTML = html;
}

function assetCls(raw) {
    const a = (raw || '').toLowerCase();
    return KNOWN_ASSETS.has(a) ? `a-${a}` : 'a-default';
}

function cardHTML(sig, stale) {
    const dir  = (sig.direction || '').toLowerCase();
    const icon = dir === 'long' ? '▲' : '▼';
    const ts   = sig.generated_at || '';
    const hz   = sig.time_horizon || 'intraday';
    const conf = Math.round((sig.confidence || 0) * 100);
    const url  = sig.article_url || '#';
    const asset = (sig.asset_class || '').toLowerCase();

    return `<a class="card ${stale ? 'stale' : dir}"
              href="${x(url)}" target="_blank"
              data-asset="${x(asset)}"
              data-url="${x(url)}">
        <div class="card-top">
            <span class="dir ${dir}">${icon} ${dir.toUpperCase()}</span>
            <span class="asset-pill ${assetCls(asset)}">${x((sig.asset_class || '—').toUpperCase())}</span>
            <span class="conf">${conf}%</span>
            <span class="age live-ts" data-ts="${x(ts)}" data-hz="${x(hz)}"></span>
        </div>
        <div class="headline">${x(sig.headline || sig.article_title || '')}</div>
        <div class="meta">
            <span class="source">${x(sig.source_name || '')}</span>
            <span>·</span>
            <span class="horizon-pill">${x(hz)}</span>
        </div>
    </a>`;
}

function rawHTML(art) {
    const ts = art.published_at || art.fetched_at || '';
    return `<a class="raw-item" href="${x(art.url || '#')}" target="_blank">
        <span class="raw-age live-ts" data-ts="${x(ts)}" data-hz="short-term"></span>
        <span class="raw-title">${x(art.title || '')}</span>
    </a>`;
}

// ─────────────────────────────────────────
// Click tracking (event delegation)
// ─────────────────────────────────────────
document.getElementById('feed').addEventListener('click', e => {
    const card = e.target.closest('.card');
    if (!card) return;
    const asset = card.dataset.asset;
    if (asset) boostAsset(asset);
    // Re-rank after 80ms (after interest update)
    setTimeout(renderFeed, 80);
});

// ─────────────────────────────────────────
// Toggle sections
// ─────────────────────────────────────────
function toggleStale() {
    const body = document.getElementById('stale-body');
    const hd   = document.getElementById('stale-hd');
    if (!body) return;
    const show = body.style.display === 'none';
    body.style.display = show ? 'block' : 'none';
    hd && hd.classList.toggle('shut', !show);
}

function toggleRaw() {
    const rf  = document.getElementById('raw-feed');
    const btn = document.getElementById('raw-btn');
    if (!rf) return;
    const open = rf.classList.toggle('open');
    if (btn) btn.textContent = open
        ? 'Hide news feed'
        : `Show latest news feed (${rf.querySelectorAll('.raw-item').length})`;
}

// ─────────────────────────────────────────
// Live timestamps (every second)
// ─────────────────────────────────────────
function fmtAge(ts, hz) {
    if (!ts) return '–';
    const ms    = Date.now() - new Date(ts).getTime();
    const s     = Math.floor(ms / 1000);
    const m     = Math.floor(s / 60);
    const h     = Math.floor(m / 60);
    const d     = Math.floor(h / 24);

    const label = s < 60   ? `${s}s ago`
                : m < 60   ? `${m}m ago`
                : h < 24   ? `${h}h ${m % 60}m ago`
                :             `${d}d ago`;

    const staleMs = (STALE_AT[hz] || STALE_AT['intraday']) * 60000;
    const pct     = ms / staleMs;
    const cls     = pct < 0.25 ? 'fresh' : pct < 0.70 ? 'warn' : 'old';

    return `<span class="${cls}">${label}</span>`;
}

function tickTimestamps() {
    document.querySelectorAll('.live-ts').forEach(el => {
        el.innerHTML = fmtAge(el.dataset.ts, el.dataset.hz);
    });
}

function tickClock() {
    document.getElementById('live-clock').textContent =
        new Date().toLocaleTimeString('en-GB', { hour12: false });
}

// ─────────────────────────────────────────
// XSS escape
// ─────────────────────────────────────────
function x(s) {
    return String(s || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
}

// ─────────────────────────────────────────
// Init
// ─────────────────────────────────────────
renderInterestStrip();
tickClock();
fetchAll();

setInterval(tickClock,      1000);
setInterval(tickTimestamps, 1000);
setInterval(renderFeed,    60000);   // re-rank for time decay
setInterval(fetchAll,      30000);   // pull fresh data
</script>
</body>
</html>
